name: Validate Registry

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate registry.json
        run: |
          python3 - <<'EOF'
          import json, sys, os, glob

          with open("registry.json") as f:
              data = json.load(f)

          components = data["components"]
          names = {c["name"] for c in components}
          errors = []

          for c in components:
              for fname in c["files"]:
                  if not os.path.exists(fname):
                      errors.append(f"[{c['name']}] declared file '{fname}' not found")
              for dep in c.get("deps", []):
                  if dep not in names:
                      errors.append(f"[{c['name']}] dep '{dep}' is not in the registry")

          registered_files = {f for c in components for f in c["files"]}
          for fpath in glob.glob("components/*.rs"):
              if fpath not in registered_files:
                  errors.append(f"File '{fpath}' exists on disk but is not listed in registry.json")

          if not os.path.exists("yei.css"):
              errors.append("yei.css not found")

          if errors:
              print("Registry validation failed:")
              for e in errors:
                  print(f"  ✗ {e}")
              sys.exit(1)

          print(f"✓ registry.json valid — {len(components)} components, no missing files or broken deps")
          EOF

  # On release: snapshot current components/ into versions/{tag}/ and commit back.
  snapshot:
    needs: validate
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create versioned snapshot
        run: |
          VERSION="${{ github.ref_name }}"
          SNAP="versions/${VERSION}"

          if [ -d "$SNAP" ]; then
            echo "Snapshot $SNAP already exists — skipping"
            exit 0
          fi

          mkdir -p "$SNAP"
          cp -r components "$SNAP/components"
          cp registry.json "$SNAP/registry.json"
          cp yei.css "$SNAP/yei.css"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "versions/"
          git commit -m "chore: snapshot ${VERSION} [skip ci]"
          git push

  deploy:
    needs: [validate, snapshot]
    if: |
      always() &&
      needs.validate.result == 'success' &&
      (needs.snapshot.result == 'success' || needs.snapshot.result == 'skipped') &&
      github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Pull registry on VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ vars.VPS_HOST }} >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }} bash <<'ENDSSH'
            set -e
            cd /opt/apps/yei-registry
            git pull --ff-only
          ENDSSH
